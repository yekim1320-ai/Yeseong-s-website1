<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUMATE — AI Research Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Plus Jakarta Sans', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      }
    }
  }
}
</script>
<style>
  body { background-color: #F4F8FC; }
  .ui-card {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 20px 40px -15px rgba(42, 115, 236, 0.06);
  }

  /* Animated organic blob */
  .glass-blob {
    background: radial-gradient(circle at 35% 35%, rgba(240,247,255,0.9) 0%, rgba(203,225,253,0.7) 50%, rgba(151,194,251,0.4) 100%);
    box-shadow:
      inset -10px -10px 25px rgba(135,183,251,0.3),
      inset 10px 10px 20px rgba(255,255,255,0.9),
      0 30px 60px -20px rgba(100,150,230,0.2);
    border: 1.5px solid rgba(255,255,255,0.6);
    animation: blobMorph 9s ease-in-out infinite, blobFloat 6s ease-in-out infinite;
  }
  @keyframes blobMorph {
    0%, 100% { border-radius: 42% 58% 65% 35% / 45% 45% 55% 55%; }
    25%      { border-radius: 58% 42% 35% 65% / 55% 65% 35% 45%; }
    50%      { border-radius: 65% 35% 45% 55% / 35% 55% 45% 65%; }
    75%      { border-radius: 35% 65% 55% 45% / 65% 35% 65% 35%; }
  }
  @keyframes blobFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-14px) rotate(2.5deg); }
  }

  .sparkle-main {
    animation: sparklePulse 3s ease-in-out infinite;
    display: inline-block;
  }
  .sparkle-corner {
    animation: sparkleTwinkle 2.4s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes sparklePulse {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    50%      { transform: scale(1.15) rotate(8deg); opacity: 0.85; }
  }
  @keyframes sparkleTwinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1; transform: scale(1.2); }
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #2A73EC; border: 3px solid #FFFFFF;
    box-shadow: 0 2px 6px rgba(42,115,236,0.3); cursor: pointer;
  }
</style>
</head>
<body class="font-sans min-h-screen antialiased selection:bg-blue-100">

<main class="w-full max-w-[1400px] mx-auto px-6 md:px-10 py-8">

  <div id="step1" class="w-full">
    <header class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <button class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" /></svg>
        </button>
        <div class="flex items-center gap-2">
          <span class="text-blue-500 text-lg">✦</span>
          <span class="text-sm font-bold text-slate-800">AI Research Agent</span>
        </div>
      </div>
      <div class="w-9 h-9 rounded-full bg-white shadow-sm border border-slate-200/60 flex items-center justify-center text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center">
      <div class="lg:col-span-6 space-y-6">
        <div class="space-y-2">
          <h1 class="text-[36px] font-bold tracking-tight text-slate-900 leading-[1.15]">Hi, let's build<br>something great.</h1>
          <p class="text-sm text-slate-500 leading-relaxed max-w-md">Your AI Research Agent finds the best PC/laptop parts within your budget and explains tradeoffs.</p>
        </div>

        <div class="ui-card p-7 rounded-[24px] space-y-6">
          <div class="space-y-3">
            <div class="flex justify-between items-baseline">
              <span class="text-xs font-bold text-slate-700 tracking-wide">What's your budget?</span>
              <span class="text-[10px] font-mono text-slate-400">USD</span>
            </div>
            <div class="text-3xl font-bold text-slate-900" id="budgetValue">$2,000</div>
            <input type="range" id="budgetRange" min="500" max="5000" step="50" value="2000" oninput="updateBudget(this.value)" class="w-full h-[4px] bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            <div class="flex justify-between text-[11px] font-medium text-slate-400">
              <span>$500</span><span>$5,000</span>
            </div>
          </div>

          <div class="space-y-3">
            <span class="text-xs font-bold text-slate-700 tracking-wide block">What's this for?</span>
            <div class="grid grid-cols-2 gap-3" id="useCaseGrid">
              <button onclick="selectUse('Gaming', this)" class="use-btn selected p-3.5 rounded-xl border border-blue-600/50 bg-[#EAF2FE] text-blue-600 flex justify-between items-center text-xs font-semibold transition-all">
                <div class="flex items-center gap-2"><span>🎮</span><span>Gaming</span></div>
                <div class="radio-dot w-4 h-4 rounded-full border border-blue-600 flex items-center justify-center bg-blue-600"><div class="w-1.5 h-1.5 bg-white rounded-full"></div></div>
              </button>
              <button onclick="selectUse('Coding / Dev', this)" class="use-btn p-3.5 rounded-xl border border-slate-200/80 bg-white text-slate-700 flex justify-between items-center text-xs font-medium hover:bg-slate-50/80 transition-all">
                <div class="flex items-center gap-2"><span>&lt;/&gt;</span><span>Coding / Dev</span></div>
                <div class="radio-dot w-4 h-4 rounded-full border border-slate-300 bg-white"></div>
              </button>
              <button onclick="selectUse('School / Study', this)" class="use-btn p-3.5 rounded-xl border border-slate-200/80 bg-white text-slate-700 flex justify-between items-center text-xs font-medium hover:bg-slate-50/80 transition-all">
                <div class="flex items-center gap-2"><span>📘</span><span>School / Study</span></div>
                <div class="radio-dot w-4 h-4 rounded-full border border-slate-300 bg-white"></div>
              </button>
              <button onclick="selectUse('Content Creation', this)" class="use-btn p-3.5 rounded-xl border border-slate-200/80 bg-white text-slate-700 flex justify-between items-center text-xs font-medium hover:bg-slate-50/80 transition-all">
                <div class="flex items-center gap-2"><span>🎬</span><span>Content Creation</span></div>
                <div class="radio-dot w-4 h-4 rounded-full border border-slate-300 bg-white"></div>
              </button>
              <button onclick="selectUse('Office Work', this)" class="use-btn p-3.5 rounded-xl border border-slate-200/80 bg-white text-slate-700 flex justify-between items-center text-xs font-medium hover:bg-slate-50/80 transition-all">
                <div class="flex items-center gap-2"><span>💼</span><span>Office Work</span></div>
                <div class="radio-dot w-4 h-4 rounded-full border border-slate-300 bg-white"></div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-6 flex flex-col items-center justify-center space-y-6 relative">
        <div class="w-64 h-64 md:w-[300px] md:h-[300px] glass-blob flex items-center justify-center relative select-none">
          <div class="sparkle-main text-blue-500/80 text-5xl drop-shadow-sm">✦</div>
          <div class="sparkle-corner absolute top-10 right-10 text-blue-400/60 text-lg">✦</div>
        </div>
        <div class="w-full max-w-[420px] space-y-3">
          <button onclick="goToStep(2)" class="w-full bg-gradient-to-r from-blue-600 to-blue-400 hover:from-blue-700 hover:to-blue-500 text-white font-semibold py-3.5 rounded-2xl text-sm shadow-md transition-all flex justify-center items-center gap-2">
            <span>✦</span><span>Start Research</span>
          </button>
          <p class="text-[11px] text-slate-400 text-center font-normal">The agent will ask a few quick questions to understand your needs.</p>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
  function updateBudget(val) {
    document.getElementById('budgetValue').innerText = '$' + Number(val).toLocaleString();
  }

  function selectUse(name, el) {
    document.querySelectorAll('.use-btn').forEach(btn => {
      btn.className = "use-btn p-3.5 rounded-xl border border-slate-200/80 bg-white text-slate-700 flex justify-between items-center text-xs font-medium hover:bg-slate-50/80 transition-all";
      const dot = btn.querySelector('.radio-dot');
      dot.className = "radio-dot w-4 h-4 rounded-full border border-slate-300 bg-white";
      dot.innerHTML = "";
    });
    el.className = "use-btn selected p-3.5 rounded-xl border border-blue-600/50 bg-[#EAF2FE] text-blue-600 flex justify-between items-center text-xs font-semibold transition-all";
    const dot = el.querySelector('.radio-dot');
    dot.className = "radio-dot w-4 h-4 rounded-full border border-blue-600 flex items-center justify-center bg-blue-600";
    dot.innerHTML = '<div class="w-1.5 h-1.5 bg-white rounded-full"></div>';
  }

  function goToStep(n) {
    console.log('Would go to step', n);
  }
</script>
</body>
</html>
